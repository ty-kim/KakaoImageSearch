name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Build & Test
        run: |
          xcrun simctl boot "iPhone 17" || true
          sleep 5
          echo 'enum KakaoAPIKey { static let restAPIKey = "test-key" }' > KakaoAPIKey.swift
          xcodebuild -project KakaoImageSearch.xcodeproj \
            -scheme KakaoImageSearch \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
            test
