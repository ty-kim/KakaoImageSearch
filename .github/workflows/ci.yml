name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Build & Test
        run: |
          xcrun simctl boot "iPhone 17" || true
          sleep 3
          xcrun simctl spawn "iPhone 17" defaults write com.apple.Preferences ConnectHardwareKeyboard -bool false
          xcrun simctl spawn "iPhone 17" defaults write com.apple.Preferences AutomaticMinimizationEnabled -bool false
          sleep 3
          echo 'enum KakaoAPIKey { static let restAPIKey = "test-key" }' > KakaoAPIKey.swift
          xcodebuild -project KakaoImageSearch.xcodeproj \
            -scheme KakaoImageSearch \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
            -resultBundlePath TestResults.xcresult \
            test
      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult
